# Defence-in-depth network isolation for the data plane (RFC 0015). These make
# the "networkless agent" claim real: an agent pod may egress ONLY to the on-node
# bridge (node-agent), the A2A gateway, and the ModelGateway — never the internet
# or other tenants. NOTE: enforced only by a NetworkPolicy-capable CNI
# (Calico/Cilium); kind's default kindnet does NOT enforce these (they are inert
# but correct, and enforce on a real cluster).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-default-deny
  namespace: default
  labels:
    app.kubernetes.io/managed-by: agentctl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent
  policyTypes: ["Ingress", "Egress"]
  # Empty ingress/egress = deny all by default; the allow policy below re-opens
  # only the sanctioned flows.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-allow-controlplane-and-dns
  namespace: default
  labels:
    app.kubernetes.io/managed-by: agentctl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent
  policyTypes: ["Egress"]
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # The control plane: node-agent (bridge), A2A gateway, ModelGateway.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentctl-system
      ports:
        - { protocol: TCP, port: 8443 }  # node-agent control API (mTLS)
        - { protocol: TCP, port: 8080 }  # gateway / modelgateway
---
# Tenant isolation: agent pods accept ingress only from the control plane
# (no cross-tenant pod-to-pod traffic).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ingress-controlplane-only
  namespace: default
  labels:
    app.kubernetes.io/managed-by: agentctl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentctl-system
