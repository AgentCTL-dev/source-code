# RBAC for the validating webhook: read ModelPool CRs for the cross-object
# "referenced modelPool exists" check.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-admission
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-admission
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["modelpools"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-admission
subjects:
  - kind: ServiceAccount
    name: agentctl-admission
    namespace: agentctl-system
