# The validating admission webhook (RFC 0007): enforces the cross-object + policy
# rules CEL can't — the lethal-trifecta override gate, an image-registry
# allow-list, and "referenced ModelPool exists". Serves HTTPS on :8443 with a
# cert from the agentctl-admission-tls Secret (see install.sh).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-admission
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-admission
    app.kubernetes.io/managed-by: agentctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-admission
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentctl-admission
    spec:
      serviceAccountName: agentctl-admission
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admission
          image: agentctl/admission:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8443, name: https }
          env:
            - name: RUST_LOG
              value: "info"
            # Image-registry allow-list (CSV prefixes); empty would allow all.
            - name: ALLOWED_REGISTRIES
              value: "mock-agent,agent:,agentctl/,gcr.io/,registry.k8s.io/"
          volumeMounts:
            - { name: tls, mountPath: /etc/agentctl-admission/tls, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: tls
          secret:
            secretName: agentctl-admission-tls
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-admission
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-admission
spec:
  selector:
    app.kubernetes.io/name: agentctl-admission
  ports:
    - { port: 443, targetPort: 8443, name: https }
