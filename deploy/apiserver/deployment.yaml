apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-apiserver
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-apiserver
    app.kubernetes.io/managed-by: agentctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentctl-apiserver
    spec:
      serviceAccountName: agentctl-apiserver
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apiserver
          image: agentctl/apiserver:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 6443, name: https }
          env:
            - name: RUST_LOG
              value: "info"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls
              mountPath: /etc/agentctl-apiserver/tls
              readOnly: true
            # Client cert for calling the node-agent control API over mTLS (RFC 0015).
            - name: client-tls
              mountPath: /etc/agentctl-client/tls
              readOnly: true
          # tcpSocket (not httpGet): the server requires a front-proxy client
          # cert for TLS, which the kubelet probes don't present.
          readinessProbe:
            tcpSocket: { port: 6443 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 6443 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 300m, memory: 128Mi }
      volumes:
        - name: tls
          secret:
            secretName: agentctl-apiserver-tls
        - name: client-tls
          secret:
            secretName: agentctl-client-tls
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-apiserver
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-apiserver
spec:
  selector:
    app.kubernetes.io/name: agentctl-apiserver
  ports:
    - { port: 443, targetPort: 6443, name: https }
