# Registers the aggregated apiserver with the kube-aggregator. caBundle is filled
# in by install.sh (the generated serving CA). The aggregator proxies
# management.agentctl.dev/v1alpha1 requests to the agentctl-apiserver Service.
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.management.agentctl.dev
  labels:
    app.kubernetes.io/name: agentctl-apiserver
    app.kubernetes.io/managed-by: agentctl
spec:
  group: management.agentctl.dev
  version: v1alpha1
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: agentctl-apiserver
    namespace: agentctl-system
    port: 443
  caBundle: CABUNDLE_PLACEHOLDER
