# The A2A gateway: a replicated, stateless HTTP service fronting the agents'
# A2A surface. Projects each agent's Agent Card and routes spec-form A2A
# JSON-RPC to the reference verbs on the agent pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-gateway
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-gateway
    app.kubernetes.io/managed-by: agentctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentctl-gateway
    spec:
      serviceAccountName: agentctl-gateway
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: agentctl/gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          env:
            - name: RUST_LOG
              value: "info"
            # Durable A2A task store.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentctl-postgres
                  key: DATABASE_URL
            # Ed25519 seed for Agent Card JWS signing.
            - name: GATEWAY_SIGNING_SEED
              valueFrom:
                secretKeyRef:
                  name: agentctl-gateway-signing
                  key: GATEWAY_SIGNING_SEED
            # Mesh registry federation: peer gateway base URLs (CSV).
            # Self-reference here demonstrates the merge (peers are queried with
            # ?local=1 to prevent recursion).
            - name: FEDERATION_PEERS
              value: "http://agentctl-gateway.agentctl-system"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Client cert for dialing agent pods' mTLS control surface directly
            # (presents the control-plane / Management origin).
            - name: client-tls
              mountPath: /etc/agentctl-client/tls
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: client-tls
          secret:
            secretName: agentctl-client-tls
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-gateway
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-gateway
spec:
  selector:
    app.kubernetes.io/name: agentctl-gateway
  ports:
    - { port: 80, targetPort: 8080, name: http }
