# Ed25519 signing key for A2A Agent Card JWS signing (RFC 0014). The gateway
# loads the 32-byte seed (base64) and serves the public key at
# /.well-known/jwks.json. DEV KEY — a real deployment mounts a managed secret
# (rotated, never in git). Shared across gateway replicas so cards verify
# consistently.
apiVersion: v1
kind: Secret
metadata:
  name: agentctl-gateway-signing
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-gateway
type: Opaque
stringData:
  # base64url of 32 bytes (dev seed).
  GATEWAY_SIGNING_SEED: YWdlbnRjdGwtZGV2LXNpZ25pbmctc2VlZC0wMDAwMDE
