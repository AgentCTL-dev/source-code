# The ModelGateway: the intelligence plane's credential-injecting,
# token-metering, budget-enforcing inference proxy. Agents reach it WITHOUT any
# provider secret; it injects the ModelPool's credential, meters per-pool tokens
# in Postgres, and enforces the pool budget.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-modelgateway
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    app.kubernetes.io/managed-by: agentctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-modelgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentctl-modelgateway
    spec:
      serviceAccountName: agentctl-modelgateway
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: modelgateway
          image: agentctl/modelgateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          env:
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentctl-postgres
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-modelgateway
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
spec:
  selector:
    app.kubernetes.io/name: agentctl-modelgateway
  ports:
    - { port: 80, targetPort: 8080, name: http }
