# RBAC for the ModelGateway: read ModelPool CRs and the provider-credential
# Secrets they reference (the credentials the control plane injects so agents
# never hold them). Secrets access is cluster-wide here for the dev MVP — a real
# deployment scopes it to the pools' namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-modelgateway
  namespace: agentctl-system
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-modelgateway
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["modelpools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["modelpools/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-modelgateway
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-modelgateway
subjects:
  - kind: ServiceAccount
    name: agentctl-modelgateway
    namespace: agentctl-system
