# A minimal once-mode Agent. The operator renders this to a Job on the stock-unix
# substrate (RFC 0002/0003). The image here is a placeholder — there is no real
# conformant-agent image in this demo, so the Job's pod will not run an actual
# agent; the point is that the operator reconciles the CR into the right workload
# and patches Agent.status.
apiVersion: agents.x-k8s.io/v1alpha1
kind: Agent
metadata:
  name: demo
  namespace: default
spec:
  mode: once
  image: busybox:1.36
  instruction: "Read /data/report.md and write a 3-bullet summary to /data/summary.md"
