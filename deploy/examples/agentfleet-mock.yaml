# A claim-mode AgentFleet backed by the mock-agent image, so its pods serve the
# management profile over their mTLS /mcp surface — enough for the gateway to
# project (and JWS-sign) a fleet-level Agent Card.
apiVersion: agentctl.dev/v1alpha1
kind: AgentFleet
metadata:
  name: mockfleet
  namespace: default
spec:
  template:
    mode: reactive
    image: mock-agent:dev
    subscribe: ["queue://noop"]
  scaling:
    mode: claim
    minReplicas: 1
    maxReplicas: 5
    target:
      metric: pending_events
      value: "5"
  work:
    source: "queue://noop"
