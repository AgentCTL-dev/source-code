# A reactive Agent backed by the mock-agent image (a conformant-agent stand-in
# that serves the management profile). The operator renders a Deployment whose pod
# serves its mTLS /mcp surface; the control plane dials it directly to read its
# capabilities and drive management verbs.
apiVersion: agentctl.dev/v1alpha1
kind: Agent
metadata:
  name: mock
  namespace: default
spec:
  mode: reactive
  image: mock-agent:dev
  instruction: "serve the management profile"
  subscribe: ["queue://noop"]
