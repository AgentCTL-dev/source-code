# A ModelPool wired to the mock provider, plus the provider-credential Secret it
# references. The ModelGateway reads this Secret and injects the key on each
# request — the agent never holds it (the agent stays secret-free). budget caps
# the pool at 150 tokens (the mock returns 100/call → the 3rd call is rejected).
apiVersion: v1
kind: Secret
metadata:
  name: provider-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: modelpool-mock
type: Opaque
stringData:
  api-key: sk-mock-provider-secret-do-not-ship
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: ModelPool
metadata:
  name: mockpool
  namespace: default
spec:
  provider: mock
  endpoint: http://mock-provider.default:8080
  credentialSecretRef:
    name: provider-credentials
    key: api-key
  models: ["mock-model-v1"]
  defaultModel: mock-model-v1
  budget:
    maxTokens: 150
