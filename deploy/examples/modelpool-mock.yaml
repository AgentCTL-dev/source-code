# A ModelPool wired to the mock provider, plus the provider-credential Secret it
# references. The operator renders INTELLIGENCE=<endpoint> into the agent and
# mounts this Secret onto the agent as its INTELLIGENCE_TOKEN (the agent dials
# the provider directly — there is no off-pod broker). Drop credentialSecretRef
# to use the agent's AAuth identity instead (the secret-free path).
apiVersion: v1
kind: Secret
metadata:
  name: provider-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: modelpool-mock
type: Opaque
stringData:
  api-key: sk-mock-provider-secret-do-not-ship
---
apiVersion: agentctl.dev/v1alpha1
kind: ModelPool
metadata:
  name: mockpool
  namespace: default
spec:
  provider: mock
  endpoint: http://mock-provider.default:8080
  credentialSecretRef:
    name: provider-credentials
    key: api-key
  models: ["mock-model-v1"]
  defaultModel: mock-model-v1
