# A claim-mode AgentFleet: a reactive worker pool. The operator renders this to a
# Deployment with .spec.replicas OMITTED (KEDA's HPA owns it, RFC 0011). (A fleet
# reconciler is a later step; this manifest verifies the AgentFleet CRD schema.)
apiVersion: agents.x-k8s.io/v1alpha1
kind: AgentFleet
metadata:
  name: workers
  namespace: default
spec:
  template:
    mode: reactive
    image: busybox:1.36
    subscribe: ["queue://jobs"]
  scaling:
    mode: claim
    min: 0
    max: 10
    target:
      signal: pending_events
      value: "5"
  workSource: "queue://jobs"
