# A claim-mode AgentFleet: an elastic reactive worker pool. The operator renders it
# to a Deployment with .spec.replicas omitted — KEDA owns the replica count and
# scales the pool from zero on the work backlog.
apiVersion: agents.x-k8s.io/v1alpha1
kind: AgentFleet
metadata:
  name: workers
  namespace: default
spec:
  template:
    mode: reactive
    image: agentd:1.0.0
    subscribe: ["queue://jobs"]
  scaling:
    mode: claim
    min: 0
    max: 10
    target:
      signal: pending_events
      value: "5"
  workSource: "queue://jobs"
