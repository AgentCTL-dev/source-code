# agentctl Helm values. The control plane is BUSL-1.1; the contract + SDK are
# Apache-2.0 (see the repo LICENSE). cert-manager is a prerequisite.

# Container images. Setting image.registry=ghcr.io/agentctl-dev pulls the published
# images (ghcr.io/agentctl-dev/<comp>:<tag>); empty registry = local (kind-loaded)
# names (agentctl/<comp>:<tag>). For reproducible, tamper-evident installs, pin by
# digest via image.digests (a digest entry wins over the tag for that component).
image:
  registry: ""                 # e.g. ghcr.io/agentctl-dev — empty = local (kind-loaded) names
  tag: dev
  pullPolicy: IfNotPresent
  pullSecrets: []
  # Digest pins (require image.registry set). Map comp -> sha256:... ; a non-empty
  # entry renders "<registry>/<comp>@<digest>" instead of the :tag for that comp.
  # Comps: operator, node-agent, apiserver, gateway, modelgateway, admission.
  #   digests:
  #     operator: sha256:...
  digests: {}

# The neutral reference agent (data plane) — used only by the bundled examples.
referenceAgent:
  image: agentd:1.0.0

# Global metadata stamped onto every rendered object (merged alongside the
# chart's own labels). commonLabels also flow into pod templates; commonAnnotations
# flow into pod templates. Default empty = no change to today's output.
commonLabels: {}
commonAnnotations: {}

# Observability. When metrics.serviceMonitor.enabled=true the chart emits a
# Prometheus-Operator ServiceMonitor per scrape target (wired in a later wave).
# Default disabled so a stock install needs no Prometheus-Operator CRDs.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}                 # extra labels for Prometheus serviceMonitorSelector

# Day-2 observability extras (both off by default so a stock install ships no
# Grafana/Prometheus-Operator-coupled objects). Pair these with
# metrics.serviceMonitor.enabled=true so the metrics they chart/alert on are scraped.
observability:
  dashboards:
    # Render the Grafana dashboard ConfigMap (templates/dashboard.yaml), labeled
    # grafana_dashboard: "1" for the Grafana sidecar's auto-discovery. No Grafana
    # CRDs needed — it is a plain ConfigMap.
    enabled: false
  alerts:
    # Render the PrometheusRule (templates/prometheusrule.yaml). Requires the
    # Prometheus-Operator CRDs (monitoring.coreos.com/v1) to be installed.
    enabled: false
    # Extra labels stamped on the PrometheusRule so your Prometheus picks it up via
    # its ruleSelector. kube-prometheus-stack selects on the release label, e.g.:
    #   labels: { release: prometheus }
    labels: {}

# Namespace the control plane runs in. Helm cannot reliably own the namespace it
# installs into (release storage needs it to pre-exist), so the chart does NOT
# create it by default. Either `helm install --create-namespace`, or pre-create it
# with the PodSecurity label the node-agent (hostPath + hostPID) needs:
#   kubectl create ns agentctl-system
#   kubectl label ns agentctl-system pod-security.kubernetes.io/enforce=privileged
namespace:
  name: agentctl-system
  create: false
  podSecurity: privileged      # node-agent needs hostPath + hostPID

# cert-manager wiring. When enabled (required), the chart creates a self-signed
# bootstrap Issuer -> a CA -> a CA Issuer, and issues every serving/mTLS cert,
# with caBundle injection into the APIService + the ValidatingWebhookConfiguration.
certManager:
  enabled: true
  # If you already run a cluster CA Issuer, set this and the chart skips the
  # self-signed bootstrap (uses your issuer as the CA for the leaf certs).
  caIssuerRef: ""              # e.g. "my-ca-clusterissuer" (ClusterIssuer)

# Durable store for the gateway + modelgateway (tasks, push configs, token usage).
postgres:
  mode: bundled               # bundled | external
  bundled:
    image: postgres:16-alpine
    # Non-root uid the Postgres container runs as (runAsUser/Group + fsGroup). 70 is
    # the postgres user in the -alpine image; the Debian postgres image uses 999 —
    # set this to match your image if you override it.
    runAsUser: 70
    storage: emptyDir         # emptyDir (eval) | pvc
    pvcSize: 5Gi
    storageClassName: ""      # pvc only; empty = cluster default StorageClass
    # In-cluster TLS for the bundled Postgres. DEFAULT false: the working
    # sslmode=disable (NoTls) path is preserved unless you opt in. Requires
    # cert-manager (certManager.enabled, the default). When true the chart:
    #   - issues a cert-manager Certificate (agentctl-postgres-tls) for
    #     agentctl-postgres.<ns>.svc[.cluster.local], signed by the chart CA;
    #   - mounts that secret at /tls (defaultMode 0640; fsGroup=runAsUser so the
    #     key is group-readable by the postgres uid) and runs postgres ssl=on;
    #   - sets DATABASE_URL sslmode=require, so the gateway/modelgateway rustls
    #     client encrypts the hop WITHOUT CA verification (see operations.md §1).
    tls:
      enabled: false
      # CA-pinned, hostname-verified Postgres hop. Requires tls.enabled. When ALSO
      # true the chart: mounts the chart CA (ca.crt from the agentctl-postgres-tls
      # secret) at /etc/agentctl-pg-ca in the gateway + modelgateway (and the
      # coordination server when coordination.store=postgres); sets DB_CA_FILE +
      # PGSSLROOTCERT to /etc/agentctl-pg-ca/ca.crt; and flips DATABASE_URL to
      # sslmode=verify-full against the .svc host (which the cert SANs cover). The
      # rustls client then verifies the server cert chains to the chart CA and the
      # hostname matches. DEFAULT false: the sslmode=require (encrypt-no-verify) path
      # is preserved. See operations.md §1 / security.md.
      verifyFull: false
  external:
    # mode=external: point at a managed Postgres via a pre-created Secret holding
    # a key 'DATABASE_URL' (postgres://user:pw@host:5432/db?sslmode=require).
    dsnSecretName: ""
    dsnSecretKey: DATABASE_URL

# ---------------------------------------------------------------------------
# Planes — per-component knobs. The operator + node-agent are always installed.
# Every block shares the same shape: replicas, logLevel, resources, scheduling
# (nodeSelector/affinity/tolerations/topologySpreadConstraints/priorityClassName),
# pod metadata (podAnnotations/podLabels), env (extraEnv/envFrom), and a
# serviceAccount.annotations passthrough. Defaults reproduce today's hardcoded
# behaviour, so a stock `helm install` renders byte-for-byte as before.
# ---------------------------------------------------------------------------

operator:
  replicas: 1                  # leader-elected: safe to raise for HA (1 active + standbys)
  logLevel: info               # -> RUST_LOG
  # Leader-elected singleton: default to the small footprint (was resources.small).
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  # Health-probe timings (httpGet against the http port). Liveness hits /healthz
  # (always 200 while the process lives); readiness hits /readyz (200 only on the
  # leader, so the Service routes to the active replica). Tune for your cluster.
  probes:
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 2
      periodSeconds: 5
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []                 # list of core-v1 EnvVar
  envFrom: []                  # list of core-v1 EnvFromSource
  serviceAccount:
    annotations: {}
  # Optional per-operator override of the KEDA scaler wiring (env SCALER_ENABLED /
  # SCALER_ADDRESS / COORDINATION_URL). Unset keys fall back to the top-level
  # `scaler` block, then to the in-cluster Service DNS defaults. Uncomment to pin:
  #   scaler:
  #     enabled: true                                   # SCALER_ENABLED
  #     address: agentctl-scaler.agentctl-system:9100   # SCALER_ADDRESS
  #     coordinationUrl: http://agentctl-coordination.agentctl-system/  # COORDINATION_URL
  # PDB only — no autoscaling (singleton). Disabled by default.
  pdb:
    enabled: false
    minAvailable: 1

nodeAgent:
  logLevel: info               # -> RUST_LOG
  # DaemonSet (one per node): footprint currently inline in node-agent.yaml.
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }
  nodeSelector: {}
  affinity: {}
  # Default tolerates everything so the bridge lands on every node (control-plane
  # taints included). Narrow this to restrict where the node-agent runs.
  tolerations:
    - operator: Exists
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  # Networkless/routed-infer proxy (RFC 0012). DISABLED by default — a stock
  # install renders no infer-proxy env/mount. When enabled the node-agent binds
  # an infer-proxy unix socket on a node-agent-owned hostPath dir (socketDir,
  # mounted read-WRITE here) and forwards attested inference to the in-cluster
  # ModelGateway Service. Agents opt in per-pod via the operator annotation
  # `agentctl.dev/routed-infer: "true"` (the Kata/networkless tier defaults it on
  # later); the operator then points the agent's AGENT_INTELLIGENCE at this
  # socket and mounts socketDir READ-ONLY into the agent pod. The node-agent
  # attests the unix-socket peer (SO_PEERCRED -> pod-uid -> X-Agent-Pod-Uid), the
  # SO_PEERCRED complement to modelgateway.attestIdentity for the tier where pods
  # have no routable IP. See docs/security.md.
  inferProxy:
    enabled: false
    # node-agent-owned hostPath dir the infer-proxy socket (infer.sock) is bound
    # in. Agents mount this dir read-only; keep it distinct from substrate.socketRoot.
    socketDir: /run/agentctl/infer

apiserver:
  enabled: true
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # Aggregated apiserver: footprint currently inline in apiserver.yaml.
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 300m, memory: 128Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

gateway:
  enabled: true
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # Stateless A2A gateway: small footprint (was resources.small).
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# TRUSTED-PROXY mode for the A2A gateway (RFC 0013/0014). When enabled the gateway
# opens a second, mTLS-protected listener on :8443 that ONLY a trusted fronting
# proxy (e.g. APISIX) may connect to. The proxy authenticates the external caller,
# then forwards the request with the verified identity carried in the
# identityHeaders. The gateway verifies the proxy's client cert against the
# agentctl CA bundle and the allowedNames allow-list (CN/SAN). Default OFF — no
# extra listener, certs, or env are rendered.
trustedProxy:
  enabled: false
  # Allow-list of client-cert CN/SANs the gateway accepts on the :8443 listener.
  # Defaults to the fronting proxy's CN ("apisix"). -> TRUSTED_PROXY_ALLOWED_NAMES
  allowedNames: ["apisix"]
  # CommonName minted on the client cert handed to the fronting proxy
  # (secret agentctl-trusted-proxy-client-tls). Keep in sync with allowedNames.
  proxyCommonName: apisix
  # Prefix for the identity headers the trusted proxy asserts. The gateway trusts
  # (on the mTLS listener) and strips (from plaintext callers) <prefix>-subject,
  # <prefix>-email, <prefix>-groups. -> TRUSTED_PROXY_HEADER_PREFIX
  headerPrefix: x-agentctl
  # Optional ADVANCED override of individual header names (e.g. a proxy that emits
  # X-Forwarded-User). Empty keys keep the prefix-derived name. Leave {} to use the
  # prefix. -> TRUSTED_PROXY_IDENTITY_HEADERS
  identityHeaders: {}

modelgateway:
  enabled: true
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # Namespaces the ModelGateway may read provider-credential Secrets in (the
  # credentials it injects so agents never hold them). Empty = a cluster-wide
  # secrets get/list ClusterRole (back-compat dev default; broad blast radius).
  # RECOMMENDED for production: list the namespaces that hold the ModelPool
  # credential Secrets — the chart then drops the cluster-wide secrets rule and
  # renders a namespaced Role + RoleBinding (secrets get/list) in each instead.
  secretsNamespaces: []
  # Attested agent identity: when true the ModelGateway derives the agent namespace
  # from the caller's source IP (a kube pod lookup keyed on pod status.podIP)
  # instead of trusting the X-Agent-Namespace request header. Robust because
  # confined tenant pods drop CAP_NET_RAW and so cannot spoof their source IP, so a
  # tenant cannot impersonate another namespace's ModelPool/budget. Requires the
  # cluster-wide pods get/list grant (always present in the ClusterRole). Default
  # false keeps the back-compat header-asserted identity. The node-agent
  # SO_PEERCRED infer-routing is the complement for the NETWORKLESS (Kata) tier
  # where pods have no IP to attest.
  attestIdentity: false
  # Inference proxy: small footprint (was resources.small).
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

admission:
  enabled: true
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # Validating webhook: small footprint (was resources.small).
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  # Image-registry allow-list the webhook enforces (CSV prefixes; empty = allow all).
  allowedRegistries: "agentd:,mock-agent,agentctl/,gcr.io/,registry.k8s.io/,ghcr.io/"
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# Claim-mode coordination server (RFC: pull/claim work source). Hands out work
# claims to AgentFleet replicas over an in-cluster HTTP/MCP endpoint. Disabled by
# default — enable with coordination.enabled=true.
coordination:
  enabled: false
  # Claim store backend. memory (default) keeps the claim queue + work.stats in
  # process — durable only for the life of the pod, so run a single replica. Set to
  # postgres to back the queue with the durable store (reuses the bundled-or-external
  # Postgres / the DATABASE_URL helper); claims then survive restarts and you can
  # raise coordination.replicas for HA (each replica shares the Postgres-backed
  # queue). Default memory renders no DATABASE_URL (today's output unchanged).
  store: memory                # memory | postgres
  # 1 is the safe default. With store=postgres the queue is durable + shared, so you
  # may raise this for HA; with store=memory keep it at 1 (per-pod in-process queue).
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # In-memory coordination server: small footprint.
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  # Horizontal autoscaling is only meaningful with store=postgres (the durable,
  # shared queue). With store=memory each replica has its own in-process queue, so
  # leave this off and keep replicas=1.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
  # Metrics: the coordination Service exposes /metrics on the http port. When
  # metrics.serviceMonitor.enabled=true the chart already renders an
  # agentctl-coordination ServiceMonitor (templates/servicemonitor.yaml) so a
  # Prometheus-Operator scrapes it — pair store=postgres HA with that for visibility.

# KEDA external scaler (RFC 0011) — claim-depth autoscaling for AgentFleets.
# A stateless gRPC service (:9100) KEDA dials to drive claim-mode fleet replica
# counts off the coordination backlog (with scale-from-zero). DISABLED by default
# so a stock install ships no KEDA-coupled objects. Enabling it (scaler.enabled=
# true) ALSO flips the operator's SCALER_ENABLED on, so the operator renders a
# keda.sh/v1alpha1 ScaledObject per claim fleet pointing at this scaler. Requires
# KEDA installed in the cluster (the operator applies ScaledObjects best-effort —
# absent KEDA CRDs it logs + sets a fleet condition, never failing the workload).
scaler:
  enabled: false
  # Resolved by the operator's KEDA wiring (templates/operator.yaml) and overridable
  # there via operator.scaler.*; empty = the in-cluster Service DNS defaults
  # (agentctl-scaler.<ns>:9100 and http://agentctl-coordination.<ns>/).
  address: ""                  # SCALER_ADDRESS the operator stamps into ScaledObjects
  coordinationUrl: ""          # COORDINATION_URL the scaler reads the backlog from
  replicas: 1
  logLevel: info               # -> RUST_LOG
  # Stateless gRPC scaler: small footprint.
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  envFrom: []
  serviceAccount:
    annotations: {}
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# Optional in-cluster bearer-token auth gate (AGENTCTL_API_TOKEN). DISABLED by
# default so a stock install runs the data-plane utility paths open (unchanged).
# When apiToken.enabled=true the chart creates a lookup-stable Secret
# (agentctl-api-token, key AGENTCTL_API_TOKEN, helm.sh/resource-policy: keep) and
# wires that token into the coordination server, ModelGateway, A2A gateway, and
# scaler; the code on those services then requires `Authorization: Bearer <token>`.
# The operator also injects it into rendered agent pods, but ONLY for agents in
# the control-plane namespace (a secretKeyRef cannot cross namespaces). Agents in
# other namespaces, and any external A2A client / producer, must obtain the token
# from the agentctl-api-token Secret and (for cross-namespace agents) have it
# replicated into their namespace. See docs/security.md + docs/operations.md.
apiToken:
  enabled: false
  # Override the generated token with a fixed/managed value (wins over the
  # lookup-stable generated one). Empty = chart generates + keeps a random token.
  value: ""

# Defense-in-depth NetworkPolicies (need a policy-enforcing CNI — kindnet ignores).
# When enabled the chart renders: (a) control-plane policies in the release
# namespace — a namespace-wide default-deny-ingress plus narrow allows for the
# sanctioned flows (aggregator->apiserver, webhook->admission, A2A ingress->gateway,
# apiserver/gateway->node-agent control API, agents->modelgateway, gateway+
# modelgateway->postgres); and (b) per-agent-namespace data-plane policies
# (default-deny + sanctioned egress/ingress) for each entry in agentNamespaces.
networkPolicies:
  enabled: false
  # Namespaces where tenant/agent (data-plane) pods run. Each listed namespace
  # gets the agent default-deny + sanctioned egress (DNS + control plane) + ingress
  # (control-plane only) policies. Defaults to [default] to match the bundled
  # examples; set to your tenant namespaces in a real multi-tenant install.
  agentNamespaces:
    - default

# Substrate: the on-node socket root the node-agent watches + the operator wires.
substrate:
  socketRoot: /run/agentctl/sockets

# Shared default-resource anchor. Still consumed by the components not yet migrated
# to per-component resources; kept as the small-footprint reference for new blocks.
resources:
  small: { requests: { cpu: 25m, memory: 32Mi }, limits: { cpu: 500m, memory: 256Mi } }
