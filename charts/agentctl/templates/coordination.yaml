{{- $ns := include "agentctl.namespace" . }}
{{- if .Values.coordination.enabled }}
# ServiceAccount for the claim-mode coordination server. No RBAC: it holds the
# claim queue in memory (or in Postgres when coordination.store=postgres) and never
# reads cluster state.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-coordination
  namespace: {{ $ns }}
  {{- with .Values.coordination.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-coordination
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
# The claim-mode coordination server: an HTTP/MCP service that hands out work
# claims to AgentFleet replicas (pull/claim work source). The default store=memory
# keeps the claim queue + stats in process (run a single replica). Set
# coordination.store=postgres to back the queue with the durable Postgres store —
# claims then survive restarts and coordination.replicas can be raised for HA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-coordination
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-coordination
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.coordination.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-coordination
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.coordination.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-coordination
        {{- $podLabels := merge (deepCopy (.Values.coordination.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-coordination
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "coordination")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coordination
          image: {{ include "agentctl.image" (dict "root" $ "component" "coordination") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "coordination") | nindent 12 }}
            {{- if eq .Values.coordination.store "postgres" }}
            # Durable claim store (coordination.store=postgres): the coordination
            # backend reads DATABASE_URL (the bundled-or-external Postgres) and keeps
            # the claim queue + work.stats in Postgres, so claims survive restarts and
            # coordination.replicas can be raised for HA. Default store=memory injects
            # nothing (in-process queue, today's behaviour).
            {{- include "agentctl.databaseUrlEnv" . | nindent 12 }}
            {{- with (include "agentctl.pgCaEnv" $) }}
            # verify-full: pin the chart CA for the Postgres hop (postgres.bundled.tls.verifyFull).
            {{- . | nindent 12 }}
            {{- end }}
            {{- end }}
            {{- if .Values.apiToken.enabled }}
            # In-cluster bearer-token gate (apiToken.enabled): require
            # `Authorization: Bearer <this>` on work.* (default off -> open).
            - name: AGENTCTL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentctl-api-token
                  key: AGENTCTL_API_TOKEN
            {{- end }}
          {{- with (index .Values "coordination").envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if eq .Values.coordination.store "postgres" }}
          {{- with (include "agentctl.pgCaVolumeMount" $) }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.coordination.resources | nindent 12 }}
      {{- if eq .Values.coordination.store "postgres" }}
      {{- with (include "agentctl.pgCaVolume" $) }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-coordination
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-coordination
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  selector:
    app.kubernetes.io/name: agentctl-coordination
  ports:
    - { port: 80, targetPort: 8080, name: http }
{{- end }}
