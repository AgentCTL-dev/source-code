{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "agentctl.namespace" . }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
    # Contract 2.0: no control-plane component needs hostPath/hostPID/privileged
    # anymore (the node-agent DaemonSet — the only such component — is retired),
    # so the control-plane namespace defaults to the `baseline` Pod Security
    # Standard. (`restricted` is a follow-up pending a seccomp audit of the
    # bundled Postgres.)
    pod-security.kubernetes.io/enforce: {{ .Values.namespace.podSecurity }}
    pod-security.kubernetes.io/audit: {{ .Values.namespace.podSecurity }}
    pod-security.kubernetes.io/warn: {{ .Values.namespace.podSecurity }}
{{- end }}
