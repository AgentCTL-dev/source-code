{{/*
Grafana dashboard for the agentctl control plane, shipped as a ConfigMap labeled
`grafana_dashboard: "1"` so the Grafana sidecar (kube-prometheus-stack's
grafana.sidecar.dashboards) auto-discovers and loads it — no manual import.
Gated on observability.dashboards.enabled (default false) so a stock install
emits nothing. The dashboard JSON lives under data["agentctl.json"]; it uses a
`${datasource}` Prometheus datasource template variable so it binds to whatever
Prometheus datasource the cluster's Grafana defines. Panels cover the operator
(reconcile/error rate, latency, leader), the A2A gateway (RPC/stream/card/task +
upstream errors), and the admission webhook (admit/deny, reviews, mutations).
*/}}
{{- if .Values.observability.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentctl-grafana-dashboard
  namespace: {{ include "agentctl.namespace" . }}
  labels:
    app.kubernetes.io/name: agentctl-grafana-dashboard
    # Picked up by the Grafana sidecar's dashboard auto-discovery.
    grafana_dashboard: "1"
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  agentctl.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Operator",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Reconcile rate (ops/s)",
          "description": "agentctl_operator_reconcile_total rate over 5m.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_operator_reconcile_total[5m]))",
              "legendFormat": "reconciles/s",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Reconcile error rate (errors/s)",
          "description": "agentctl_operator_reconcile_errors_total rate over 5m.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_operator_reconcile_errors_total[5m]))",
              "legendFormat": "errors/s",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Reconcile latency p99 (s)",
          "description": "Reconcile duration quantiles from agentctl_operator_reconcile_duration_seconds.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum(rate(agentctl_operator_reconcile_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.50, sum(rate(agentctl_operator_reconcile_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "range": true,
              "refId": "B"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Active leaders",
          "description": "sum(agentctl_operator_leader) \u2014 should read exactly 1 with a healthy leader.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(agentctl_operator_leader)",
              "legendFormat": "leaders",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "row",
          "title": "A2A Gateway",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Request rate by surface (req/s)",
          "description": "Gateway request rates across the RPC / stream / card / task surfaces.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_gateway_rpc_requests_total[5m]))",
              "legendFormat": "rpc",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_gateway_stream_requests_total[5m]))",
              "legendFormat": "stream",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_gateway_card_requests_total[5m]))",
              "legendFormat": "card",
              "range": true,
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_gateway_tasks_total[5m]))",
              "legendFormat": "tasks",
              "range": true,
              "refId": "D"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Upstream error rate (errors/s)",
          "description": "agentctl_gateway_upstream_errors_total rate over 5m.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_gateway_upstream_errors_total[5m]))",
              "legendFormat": "upstream errors/s",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "Admission webhook",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 27
          },
          "panels": []
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Admit / deny rate (req/s)",
          "description": "Validating-webhook admit vs deny decision rates.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 28
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_admission_admit_total[5m]))",
              "legendFormat": "admit/s",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_admission_deny_total[5m]))",
              "legendFormat": "deny/s",
              "range": true,
              "refId": "B"
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Review rate (req/s)",
          "description": "agentctl_admission_reviews_total rate over 5m.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 28
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_admission_reviews_total[5m]))",
              "legendFormat": "reviews/s",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Mutations / patched (ops/s)",
          "description": "Defaulting-webhook mutation rate and how many produced a JSON patch.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 28
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_admission_mutations_total[5m]))",
              "legendFormat": "mutations/s",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(agentctl_admission_mutations_patched_total[5m]))",
              "legendFormat": "patched/s",
              "range": true,
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "agentctl",
        "control-plane"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Data source",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "agentctl control plane",
      "uid": "agentctl-control-plane",
      "version": 1,
      "weekStart": ""
    }
{{- end }}
