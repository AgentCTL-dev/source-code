{{- if .Values.certManager.enabled }}
{{- $ns := include "agentctl.namespace" . }}
{{- if not .Values.certManager.caIssuerRef }}
# Bootstrap: self-signed CLUSTER issuer -> the agentctl CA -> a CA CLUSTER
# issuer that mints the leaf certs below AND the per-workload serving certs the
# operator requests in AGENT namespaces (contract 2.0: every agent pod serves
# mTLS HTTPS). A ClusterIssuer reads its CA secret from cert-manager's
# "cluster resource namespace" (the cert-manager install namespace by default),
# so the CA Certificate is placed THERE — that is the one cross-namespace write
# this chart makes, and it is what lets ONE CA sign identities cluster-wide.
# (All skipped if you supply certManager.caIssuerRef.)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: agentctl-selfsigned
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-ca
  namespace: {{ .Values.certManager.clusterResourceNamespace | default "cert-manager" }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: agentctl-ca
  secretName: agentctl-ca-key
  duration: 87600h    # 10y
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: agentctl-selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: agentctl-ca
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  ca:
    secretName: agentctl-ca-key
---
{{- end }}
# --- leaf certs (all signed by the agentctl CA; secrets carry ca.crt) ---
# Aggregated APIServer serving cert (caBundle injected into the APIService).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-apiserver
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-apiserver-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-apiserver.{{ $ns }}.svc
    - agentctl-apiserver.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- if .Values.admission.enabled }}
---
# Admission webhook serving cert (caBundle injected into the ValidatingWebhookConfiguration).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-admission
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-admission-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-admission.{{ $ns }}.svc
    - agentctl-admission.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- end }}
---
# node-agent control-API server cert (mTLS on :8443). Clients verify the CA only
# (the node-agent is addressed by dynamic pod IP), so the SAN is informational.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-node-agent
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-node-agent-tls
  duration: 8760h
  renewBefore: 720h
  commonName: agentctl-node-agent
  dnsNames: ["agentctl-node-agent"]
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- if .Values.modelgateway.enabled }}
---
# ModelGateway serving cert (contract 2.0): agents dial their rendered
# AGENT_INTELLIGENCE=https://agentctl-modelgateway... keyless — this cert
# chains to the same cluster CA the agent trusts via --tls-ca.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-modelgateway
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-modelgateway-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-modelgateway.{{ $ns }}.svc
    - agentctl-modelgateway.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- end }}
{{- if .Values.mcpgateway.enabled }}
---
# MCPGateway serving cert (RFC 0019): agents dial their rendered
# --mcp <name>=https://agentctl-mcpgateway.../s/<name> keyless — this cert
# chains to the same cluster CA the agent trusts via --tls-ca.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-mcpgateway
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-mcpgateway-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-mcpgateway.{{ $ns }}.svc
    - agentctl-mcpgateway.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- end }}
---
# Control-plane client cert (apiserver + gateway present this to the node-agent).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-client
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-client-tls
  duration: 8760h
  renewBefore: 720h
  commonName: agentctl-control-plane
  usages: ["client auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- if and .Values.gateway.enabled .Values.trustedProxy.enabled }}
---
# TRUSTED-PROXY (RFC 0013): serving cert for the gateway's mTLS :8443 listener, so
# the fronting proxy (APISIX) can verify the gateway. Secret carries ca.crt, which
# the gateway also loads (TRUSTED_PROXY_CA) to verify the proxy's client cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-trusted-proxy
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-trusted-proxy-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-gateway.{{ $ns }}.svc
    - agentctl-gateway.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
---
# TRUSTED-PROXY (RFC 0013): client cert the operator hands to the fronting proxy
# (APISIX) so it can connect to the gateway's :8443 listener over mTLS. Signed by
# the agentctl CA; CN must be in trustedProxy.allowedNames (default "apisix").
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-trusted-proxy-client
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-trusted-proxy-client-tls
  duration: 8760h
  renewBefore: 720h
  commonName: {{ .Values.trustedProxy.proxyCommonName | default "apisix" | quote }}
  usages: ["client auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- end }}
{{- if .Values.coordination.mtls.enabled }}
---
# COORDINATION mTLS: serving cert for the coordination server's mTLS :8443 listener,
# so the scaler can verify the coordination server. Secret carries ca.crt, which the
# coordination server also loads (COORDINATION_MTLS_CA) to verify the scaler's client
# cert. Rendered only when coordination.mtls.enabled (default off renders nothing).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-coordination-mtls
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-coordination-mtls-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - agentctl-coordination.{{ $ns }}.svc
    - agentctl-coordination.{{ $ns }}.svc.cluster.local
  usages: ["server auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
---
# COORDINATION mTLS: client cert the scaler presents to the coordination server's
# :8443 listener. Signed by the agentctl CA; CN must be in
# coordination.mtls.allowedNames (default "agentctl-scaler"). Secret carries ca.crt,
# which the scaler loads (COORDINATION_CA) to verify the coordination serving cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agentctl-scaler-client
  namespace: {{ $ns }}
  labels:
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  secretName: agentctl-scaler-client-tls
  duration: 8760h
  renewBefore: 720h
  commonName: {{ .Values.coordination.mtls.scalerCommonName | default "agentctl-scaler" | quote }}
  usages: ["client auth"]
  issuerRef:
    {{- include "agentctl.caIssuer" . | nindent 4 }}
{{- end }}
{{- end }}
