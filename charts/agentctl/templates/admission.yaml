{{- if .Values.admission.enabled }}
{{- $ns := include "agentctl.namespace" . }}
# RBAC for the validating webhook: read ModelPool CRs for the cross-object
# "referenced model.pool exists" check.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-admission
  namespace: {{ $ns }}
  {{- with .Values.admission.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["agentctl.dev"]
    resources: ["modelpools"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-admission
subjects:
  - kind: ServiceAccount
    name: agentctl-admission
    namespace: {{ $ns }}
---
# The validating admission webhook: enforces the cross-object + policy
# rules CEL can't — the lethal-trifecta override gate, an image-registry
# allow-list, and "referenced ModelPool exists". Serves HTTPS on :8443 with a
# cert from the agentctl-admission-tls Secret (created by templates/certificates.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-admission
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.admission.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-admission
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.admission.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-admission
        {{- $podLabels := merge (deepCopy (.Values.admission.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-admission
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "admission")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admission
          image: {{ include "agentctl.image" (dict "root" $ "component" "admission") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8443, name: https }
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "admission") | nindent 12 }}
            # Image-registry allow-list (CSV prefixes); empty would allow all.
            - name: ALLOWED_REGISTRIES
              value: {{ .Values.admission.allowedRegistries | quote }}
          {{- with (index .Values "admission").envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - { name: tls, mountPath: /etc/agentctl-admission/tls, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.admission.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: agentctl-admission-tls
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-admission
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  selector:
    app.kubernetes.io/name: agentctl-admission
  ports:
    - { port: 443, targetPort: 8443, name: https }
---
# Registers the validating webhook for Agent + AgentFleet CREATE/UPDATE. caBundle
# is injected by cert-manager via the inject-ca-from annotation (the CA that signed
# the webhook's serving cert). failurePolicy Fail: if the webhook is unreachable,
# the apiserver rejects the request (the trifecta gate must not be bypassable).
# AgentFleet is covered because spec.template is an AgentSpec carrying the same
# image/exec/egress/secrets — without it, a fleet bypasses the registry + trifecta
# gates entirely. ModelPool is NOT listed: its budget (maxTokens > 0) and
# credentialSecretRef.name invariants are already enforced by CRD CEL
# (x-kubernetes-validations), and provider/endpoint are structurally required — the
# webhook would only duplicate CEL.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
  annotations:
    cert-manager.io/inject-ca-from: "{{ $ns }}/agentctl-admission"
webhooks:
  - name: agents.admission.agentctl.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    clientConfig:
      service:
        name: agentctl-admission
        namespace: {{ $ns }}
        path: /validate
        port: 443
    rules:
      - apiGroups: ["agentctl.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["agents", "agentfleets"]
        scope: Namespaced
---
# Registers the DEFAULTING mutating webhook for Agent + AgentFleet CREATE/UPDATE.
# Kubernetes sequences mutating admission BEFORE validating admission, so these
# secure defaults (labels + mode + minimal surfaces) are in place before the
# validating webhook above runs. reinvocationPolicy Never: defaults are computed
# once, idempotently (every op is conditional on the field being absent). It shares
# the :8443 server, the agentctl-admission Service, and the agentctl-admission-tls
# cert with the validating webhook. NOTE: it deliberately does NOT default
# spec.substrate — the secure default is tenancy-derived and the
# most-isolated tier (kata-hybrid) needs a Kata RuntimeClass absent on most stock
# clusters; leaving it absent lets the operator/renderer resolve it
# from AgentClass/tenancy rather than breaking stock clusters.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: agentctl-admission
  labels:
    app.kubernetes.io/name: agentctl-admission
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
  annotations:
    cert-manager.io/inject-ca-from: "{{ $ns }}/agentctl-admission"
webhooks:
  - name: defaulting.agents.admission.agentctl.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    reinvocationPolicy: Never
    timeoutSeconds: 5
    clientConfig:
      service:
        name: agentctl-admission
        namespace: {{ $ns }}
        path: /mutate
        port: 443
    rules:
      - apiGroups: ["agentctl.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["agents", "agentfleets"]
        scope: Namespaced
{{- end }}
