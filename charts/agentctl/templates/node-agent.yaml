{{- $ns := include "agentctl.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-node-agent
  namespace: {{ $ns }}
  {{- with .Values.nodeAgent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-node-agent
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
# node-agent (RFC 0008, Tier A — control bridge), one per node. Mounts the
# stock-unix hostPath socket root, discovers per-pod management sockets, and
# bridges to each agent's management profile. (The operator↔node-agent API and
# the A2A data-path tier are layered on next; this is discovery + bridge.)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agentctl-node-agent
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-node-agent
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-node-agent
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.nodeAgent.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-node-agent
        {{- $podLabels := merge (deepCopy (.Values.nodeAgent.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-node-agent
      # hostPID: the bridge reads the management socket peer's host PID
      # (UnixStream::peer_cred) to attest, via /proc/<pid>/cgroup, that the
      # process serving the socket really belongs to the claimed pod (RFC 0002 §7).
      hostPID: true
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "nodeAgent")) }}
      {{- . | nindent 6 }}
      {{- end }}
      # Pod-level hardening: RuntimeDefault seccomp for every container. The bridge
      # MUST stay root + hostPID + hostPath (RFC 0008: it reads root-owned per-pod
      # sockets and attests peers via /proc), so runAsUser stays 0 — but it is
      # otherwise stripped to the floor (no caps, no privilege escalation, read-only
      # root fs) below.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node-agent
          image: {{ include "agentctl.image" (dict "root" $ "component" "node-agent") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }       # /healthz + /metrics (plaintext)
            - { containerPort: 8443, name: https }       # /v1/agents/* (mTLS, RFC 0015)
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "nodeAgent") | nindent 12 }}
            - name: AGENTCTL_SOCKET_ROOT
              value: {{ .Values.substrate.socketRoot | quote }}
            {{- if .Values.nodeAgent.inferProxy.enabled }}
            # Networkless/routed-infer (RFC 0012): the node-agent binds an
            # infer-proxy unix socket on a node-agent-owned hostPath dir. Agents
            # on the routed-infer path (operator annotation agentctl.dev/routed-infer)
            # dial this socket instead of the ModelGateway directly; the node-agent
            # attests the peer via SO_PEERCRED (-> X-Agent-Pod-Uid) and forwards to
            # the in-cluster ModelGateway Service. See docs/security.md.
            - name: NODE_AGENT_INFER_SOCKET
              value: {{ printf "%s/infer.sock" .Values.nodeAgent.inferProxy.socketDir | quote }}
            # Trailing dot = ABSOLUTE (fully-qualified) name: a 4-dot Service name
            # is < ndots:5, so without it the stub resolver walks the `search`
            # list FIRST and a node-inherited wildcard search domain can capture
            # the lookup, sending the forward to a foreign host. The node-agent
            # also absolutizes this defensively, but emit it correct at the source.
            - name: MODELGATEWAY_URL
              value: {{ printf "http://agentctl-modelgateway.%s.svc.cluster.local." $ns | quote }}
            {{- if .Values.apiToken.enabled }}
            # The infer-proxy forwards to the ModelGateway, which is behind the
            # apiToken bearer gate when apiToken.enabled — present the same token.
            - name: AGENTCTL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentctl-api-token
                  key: AGENTCTL_API_TOKEN
            {{- end }}
            {{- end }}
          {{- with (index .Values "nodeAgent").envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            # Host-side bridge: reads per-pod sockets the kubelet creates on the
            # hostPath (root-owned), so it runs as root (RFC 0008/0015). It needs
            # NO Linux capabilities beyond default root file access — drop ALL —
            # and is otherwise minimally privileged: no privilege escalation and a
            # read-only root filesystem (writable scratch is the /tmp emptyDir).
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: sockets
              mountPath: /run/agentctl/sockets
            {{- if .Values.nodeAgent.inferProxy.enabled }}
            # Read-WRITE: the node-agent owns + binds the infer-proxy socket here.
            # Agent pods mount this same hostPath dir READ-ONLY (via the operator).
            - name: infer
              mountPath: {{ .Values.nodeAgent.inferProxy.socketDir | quote }}
            {{- end }}
            - name: tls
              mountPath: /etc/agentctl-node-agent/tls
              readOnly: true
            # Writable scratch: readOnlyRootFilesystem makes / read-only, so give
            # the process a tmpfs-backed /tmp to work in.
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.nodeAgent.resources | nindent 12 }}
      volumes:
        - name: sockets
          hostPath:
            path: {{ .Values.substrate.socketRoot }}
            type: DirectoryOrCreate
        {{- if .Values.nodeAgent.inferProxy.enabled }}
        # node-agent-owned infer-proxy socket dir (routed-infer / networkless tier).
        - name: infer
          hostPath:
            path: {{ .Values.nodeAgent.inferProxy.socketDir }}
            type: DirectoryOrCreate
        {{- end }}
        - name: tls
          secret:
            secretName: agentctl-node-agent-tls
        # Writable scratch for the read-only-rootfs container.
        - name: tmp
          emptyDir: {}
