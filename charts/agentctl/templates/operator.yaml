{{- $ns := include "agentctl.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  {{- with .Values.operator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["agentctl.dev"]
    resources: ["agents", "agentfleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["agentctl.dev"]
    resources: ["agents/status", "agentfleets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agentctl.dev"]
    resources: ["agents/finalizers", "agentfleets/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # KEDA ScaledObjects for claim-mode AgentFleets. The operator applies
  # these best-effort; a cluster without the KEDA CRDs simply never has them
  # created (the operator gates emission on SCALER_ENABLED and tolerates absence).
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workload PKI (contract 1.0): a per-workload serving Certificate is applied
  # into each Agent/Fleet's namespace (same soft-dependency discipline as KEDA),
  # and the cluster-CA PUBLIC cert is distributed as the per-namespace
  # agentctl-ca ConfigMap agent pods mount for client-CA + outbound trust.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
{{- if .Values.networkPolicies.enabled }}
  # Tenant isolation: when networkPolicies.enabled, the operator
  # reconciles the per-namespace agent NetworkPolicies (default-deny + sanctioned
  # gateway/DNS egress + control-plane-only ingress) into each Agent/Fleet's OWN
  # namespace, so a dynamically-created tenant namespace is isolated without a
  # chart re-render.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
{{- end }}
  # Bound MCP tool servers: the operator reads the MCPServerSets an
  # Agent binds to render its --mcp gateway URLs + trifecta tags.
  - apiGroups: ["agentctl.dev"]
    resources: ["mcpserversets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # The kube Recorder emits via the modern events.k8s.io/v1 API group.
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election (operator HA): contend for the coordination.k8s.io Lease
  # named "agentctl-operator" so only one replica runs the reconcile loop.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-operator
subjects:
  - kind: ServiceAccount
    name: agentctl-operator
    namespace: {{ $ns }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-operator
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.operator.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-operator
        {{- $podLabels := merge (deepCopy (.Values.operator.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-operator
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "operator")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: {{ include "agentctl.image" (dict "root" $ "component" "operator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }       # /healthz, /readyz, /metrics
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "operator") | nindent 12 }}
            # Downward API: pod name is the leader-election holderIdentity; the
            # namespace scopes the coordination.k8s.io Lease (operator HA).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # KEDA scaler wiring for claim-mode AgentFleets. The
            # operator renders a ScaledObject per claim fleet when SCALER_ENABLED;
            # SCALER_ADDRESS is the external scaler's gRPC endpoint and
            # COORDINATION_URL the backlog source it reads. Resolution order:
            # operator.scaler.* override -> top-level scaler block -> in-cluster
            # Service DNS / the scaler component toggle. Default OFF (scaler block
            # disabled) so a stock install emits no KEDA objects.
            {{- $scaler := .Values.scaler | default dict }}
            {{- $opScaler := .Values.operator.scaler | default dict }}
            {{- $scalerEnabled := ($scaler.enabled | default false) }}
            {{- if hasKey $opScaler "enabled" }}{{- $scalerEnabled = $opScaler.enabled }}{{- end }}
            - name: SCALER_ENABLED
              value: {{ $scalerEnabled | quote }}
            - name: SCALER_ADDRESS
              value: {{ ($opScaler.address | default $scaler.address | default (printf "agentctl-scaler.%s:9100" $ns)) | quote }}
            # When coordination.mtls.enabled the scaler reads work.stats over the
            # coordination mTLS listener (:8443, https, trailing-dot FQDN), so the
            # rendered ScaledObject's coordinationUrl must point there (the scaler
            # presents its client cert). Else the plaintext :8080 (token) endpoint.
            {{- $coordDefault := printf "http://agentctl-coordination.%s/" $ns }}
            {{- if .Values.coordination.mtls.enabled }}
            {{- $coordDefault = printf "https://agentctl-coordination.%s.svc.cluster.local.:8443/" $ns }}
            {{- end }}
            - name: COORDINATION_URL
              value: {{ ($opScaler.coordinationUrl | default $scaler.coordinationUrl | default $coordDefault) | quote }}
            # In-cluster bearer-token injection (apiToken.enabled). When set, the
            # operator injects the bearer token (valueFrom secretKeyRef on the
            # agentctl-api-token Secret) into rendered agent pods so a conformant
            # agent can present it to the coordination server / ModelGateway. A
            # secretKeyRef cannot cross namespaces, so the operator only injects
            # for agents IN the control-plane namespace (it reads POD_NAMESPACE
            # above); agents elsewhere need the Secret replicated. Default off ->
            # no injection (unchanged). No extra RBAC: the kubelet resolves the
            # secretKeyRef at pod start, not the operator.
            - name: API_TOKEN_ENABLED
              value: {{ .Values.apiToken.enabled | default false | quote }}
            # Tenant network isolation: when on, the operator reconciles
            # the per-namespace agent NetworkPolicies into each Agent/Fleet's own
            # namespace (scoped to the control-plane namespace read from
            # POD_NAMESPACE above). Off -> no reconciliation (unchanged); the
            # chart's static agentNamespaces set still applies where listed.
            - name: NETWORK_POLICIES_ENABLED
              value: {{ .Values.networkPolicies.enabled | default false | quote }}
            # Workload PKI + keyless intelligence wiring (contract 1.0). The
            # operator issues a per-workload serving Certificate (issuerRef
            # below), distributes the CA public cert per namespace (read from
            # its own mount), and renders INTELLIGENCE at the ModelGateway
            # over https (absolute trailing-dot FQDN so no DNS search list can
            # capture it; keyless — identity is source-IP attestation there).
            {{- if .Values.certManager.enabled }}
            - name: AGENTCTL_ISSUER_REF
              value: {{ include "agentctl.issuerRefEnv" . | quote }}
            - name: AGENTCTL_CA_FILE
              value: /etc/agentctl/ca/ca.crt
            {{- end }}
            {{- if .Values.modelgateway.enabled }}
            - name: AGENTCTL_MODELGATEWAY_URL
              value: {{ .Values.operator.modelgatewayUrl | default (printf "https://agentctl-modelgateway.%s.svc.cluster.local." $ns) | quote }}
            {{- end }}
            {{- if .Values.mcpgateway.enabled }}
            # The MCPGateway URL rendered into each bound MCP server's --mcp flag
            # (absolute trailing-dot FQDN, keyless dial).
            - name: AGENTCTL_MCPGATEWAY_URL
              value: {{ .Values.operator.mcpgatewayUrl | default (printf "https://agentctl-mcpgateway.%s.svc.cluster.local." $ns) | quote }}
            {{- end }}
            {{- with .Values.operator.defaultAgentImage }}
            # Default agent image: rendered into an Agent/AgentFleet pod when the
            # template omits spec.image. A per-resource spec.image always overrides.
            - name: AGENTCTL_DEFAULT_AGENT_IMAGE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.gateway.enabled }}
            # The A2A gateway base URL a coordinator's `--a2a-peer worker=…` is
            # rendered against for `distribution: a2a`. Unused for the default
            # `queue` distribution.
            - name: AGENTCTL_GATEWAY_URL
              value: {{ .Values.operator.gatewayUrl | default (printf "http://agentctl-gateway.%s.svc.cluster.local.:8080" $ns) | quote }}
            {{- end }}
          {{- with .Values.operator.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.certManager.enabled }}
          volumeMounts:
            # The cluster CA PUBLIC cert (every chart leaf Secret carries
            # ca.crt; the client-tls leaf always exists). Source of the
            # per-namespace agentctl-ca ConfigMap the operator distributes.
            - name: agentctl-ca
              mountPath: /etc/agentctl/ca
              readOnly: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Liveness: the process is up (served by every replica, leader or
          # standby). Readiness: 200 only once this replica holds leadership AND
          # the manager is running — so the Service routes to the active leader.
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: {{ .Values.operator.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: {{ .Values.operator.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- if .Values.certManager.enabled }}
      volumes:
        # ca.crt only — the operator holds the CA PUBLIC half, never its key.
        - name: agentctl-ca
          secret:
            secretName: agentctl-client-tls
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
---
# Metrics Service for the operator. Selects every operator replica and
# exposes the http port so the operator ServiceMonitor can scrape /metrics.
# publishNotReadyAddresses: scrape standbys too (which report /readyz 503) so the
# leader gauge is observable across all replicas — exactly one should read 1.
apiVersion: v1
kind: Service
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: agentctl-operator
  ports:
    - { port: 8080, targetPort: http, name: http }
# NOTE: the operator's PodDisruptionBudget now lives in templates/pdb.yaml
# alongside the other components' PDBs (rendered when operator.pdb.enabled).
