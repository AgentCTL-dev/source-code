{{- $ns := include "agentctl.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  {{- with .Values.operator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents", "agentfleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents/status", "agentfleets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents/finalizers", "agentfleets/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-operator
subjects:
  - kind: ServiceAccount
    name: agentctl-operator
    namespace: {{ $ns }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-operator
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.operator.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-operator
        {{- $podLabels := merge (deepCopy (.Values.operator.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-operator
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "operator")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: {{ include "agentctl.image" (dict "root" $ "component" "operator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "operator") | nindent 12 }}
          {{- with .Values.operator.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # NOTE: no liveness/readiness probes — the operator has no health
          # endpoint yet (a later code wave). Adding probes now would crash-loop it.
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
# NOTE: the operator's PodDisruptionBudget now lives in templates/pdb.yaml
# alongside the other components' PDBs (rendered when operator.pdb.enabled).
