{{- $ns := include "agentctl.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  {{- with .Values.operator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents", "agentfleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents/status", "agentfleets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents/finalizers", "agentfleets/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # The kube Recorder emits via the modern events.k8s.io/v1 API group.
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election (operator HA): contend for the coordination.k8s.io Lease
  # named "agentctl-operator" so only one replica runs the reconcile loop.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-operator
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-operator
subjects:
  - kind: ServiceAccount
    name: agentctl-operator
    namespace: {{ $ns }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-operator
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.operator.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-operator
        {{- $podLabels := merge (deepCopy (.Values.operator.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-operator
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "operator")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: {{ include "agentctl.image" (dict "root" $ "component" "operator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }       # /healthz, /readyz, /metrics
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "operator") | nindent 12 }}
            # Downward API: pod name is the leader-election holderIdentity; the
            # namespace scopes the coordination.k8s.io Lease (operator HA).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- with .Values.operator.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Liveness: the process is up (served by every replica, leader or
          # standby). Readiness: 200 only once this replica holds leadership AND
          # the manager is running — so the Service routes to the active leader.
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: {{ .Values.operator.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: {{ .Values.operator.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
---
# Metrics Service for the operator (RFC 0010). Selects every operator replica and
# exposes the http port so the operator ServiceMonitor can scrape /metrics.
# publishNotReadyAddresses: scrape standbys too (which report /readyz 503) so the
# leader gauge is observable across all replicas — exactly one should read 1.
apiVersion: v1
kind: Service
metadata:
  name: agentctl-operator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-operator
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: agentctl-operator
  ports:
    - { port: 8080, targetPort: http, name: http }
# NOTE: the operator's PodDisruptionBudget now lives in templates/pdb.yaml
# alongside the other components' PDBs (rendered when operator.pdb.enabled).
