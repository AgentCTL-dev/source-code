{{- if .Values.modelgateway.enabled }}
{{- $ns := include "agentctl.namespace" . }}
{{- $secretsNs := .Values.modelgateway.secretsNamespaces | default (list) }}
# RBAC for the ModelGateway: read ModelPool CRs and the provider-credential
# Secrets they reference (the credentials the control plane injects so agents
# never hold them). ModelPool access is cluster-wide. Secrets access defaults to
# cluster-wide (modelgateway.secretsNamespaces empty) for the dev MVP — a large
# credential blast radius. RECOMMENDED: set modelgateway.secretsNamespaces to the
# namespaces holding the credential Secrets; the chart then drops the cluster-wide
# secrets rule and instead binds a namespaced Role (secrets get/list) per namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-modelgateway
  namespace: {{ $ns }}
  {{- with .Values.modelgateway.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-modelgateway
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["modelpools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["modelpools/status"]
    verbs: ["get", "update", "patch"]
  # Source-IP identity attestation (modelgateway.attestIdentity): the gateway looks
  # up the calling pod by its source IP to derive the agent namespace, instead of
  # trusting the X-Agent-Namespace header. Needs cluster-wide pods get/list. The
  # grant is harmless when attestIdentity is off, so it is unconditional (keeps the
  # ClusterRole stable across the toggle).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  {{- if not $secretsNs }}
  # No secretsNamespaces set -> cluster-wide secrets read (dev default). Scope it
  # via modelgateway.secretsNamespaces to render namespaced Roles instead.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-modelgateway
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-modelgateway
subjects:
  - kind: ServiceAccount
    name: agentctl-modelgateway
    namespace: {{ $ns }}
{{- range $secretsNs }}
---
# Scoped credential read: secrets get/list confined to {{ . }} (instead of the
# cluster-wide rule above). One Role+RoleBinding per modelgateway.secretsNamespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentctl-modelgateway-secrets
  namespace: {{ . }}
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" $ | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentctl-modelgateway-secrets
  namespace: {{ . }}
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" $ | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentctl-modelgateway-secrets
subjects:
  - kind: ServiceAccount
    name: agentctl-modelgateway
    namespace: {{ $ns }}
{{- end }}
---
# The ModelGateway (RFC 0012): the intelligence plane's credential-injecting,
# token-metering, budget-enforcing inference proxy. Agents reach it WITHOUT any
# provider secret; it injects the ModelPool's credential, meters per-pool tokens
# in Postgres, and enforces the pool budget.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-modelgateway
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.modelgateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-modelgateway
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.modelgateway.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-modelgateway
        {{- $podLabels := merge (deepCopy (.Values.modelgateway.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-modelgateway
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "modelgateway")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: modelgateway
          image: {{ include "agentctl.image" (dict "root" $ "component" "modelgateway") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }
            {{- if .Values.certManager.enabled }}
            - { containerPort: 8443, name: https }
            {{- end }}
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "modelgateway") | nindent 12 }}
            {{- include "agentctl.databaseUrlEnv" . | nindent 12 }}
            {{- with (include "agentctl.pgCaEnv" $) }}
            # verify-full: pin the chart CA for the Postgres hop (postgres.bundled.tls.verifyFull).
            {{- . | nindent 12 }}
            {{- end }}
            # Downward API: the ModelGateway's own (control-plane) namespace. Source-IP
            # attestation (modelgateway.attestIdentity) uses it to anchor the trusted
            # node-agent forwarder to a pod in THIS namespace running the
            # agentctl-node-agent ServiceAccount — an anchor a tenant cannot forge.
            # Unset/empty -> NO forwarder is trusted (fail closed). Harmless when attest
            # is off, so it is unconditional (keeps the env stable across the toggle).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.modelgateway.attestIdentity }}
            # Source-IP identity attestation (modelgateway.attestIdentity): derive the
            # agent namespace from the caller's source IP (kube pod lookup) instead of
            # trusting the X-Agent-Namespace header. Confined tenant pods drop
            # CAP_NET_RAW, so they cannot spoof the source IP. Default off renders no env.
            - name: IDENTITY_ATTEST
              value: "true"
            {{- end }}
            {{- if .Values.apiToken.enabled }}
            # In-cluster bearer-token gate (apiToken.enabled): require
            # `Authorization: Bearer <this>` on /v1/infer (default off -> open).
            - name: AGENTCTL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentctl-api-token
                  key: AGENTCTL_API_TOKEN
            {{- end }}
            {{- if .Values.certManager.enabled }}
            # TLS listener (contract 2.0): agents dial the rendered
            # AGENT_INTELLIGENCE=https://agentctl-modelgateway... keyless; the
            # serving cert chains to the cluster CA the agent trusts (--tls-ca).
            # Server-auth only — the agent's identity is source-IP attestation.
            - name: MODELGATEWAY_TLS_ADDR
              value: 0.0.0.0:8443
            - name: MODELGATEWAY_TLS_DIR
              value: /etc/agentctl/tls
            {{- end }}
          {{- with (index .Values "modelgateway").envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.certManager.enabled (include "agentctl.pgCaVolumeMount" $) }}
          volumeMounts:
            {{- with (include "agentctl.pgCaVolumeMount" $) }}
            {{- . | nindent 12 }}
            {{- end }}
            {{- if .Values.certManager.enabled }}
            - name: modelgateway-tls
              mountPath: /etc/agentctl/tls
              readOnly: true
            {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Gate liveness/readiness until the process is up and the DB schema
          # migration has run, so a slow first start (waiting on Postgres) does
          # not trip the liveness probe and crash-loop the pod. ~60s budget.
          startupProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.modelgateway.resources | nindent 12 }}
      {{- if or .Values.certManager.enabled (include "agentctl.pgCaVolume" $) }}
      volumes:
        {{- with (include "agentctl.pgCaVolume" $) }}
        {{- . | nindent 8 }}
        {{- end }}
        {{- if .Values.certManager.enabled }}
        - name: modelgateway-tls
          secret:
            secretName: agentctl-modelgateway-tls
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-modelgateway
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-modelgateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  selector:
    app.kubernetes.io/name: agentctl-modelgateway
  ports:
    - { port: 80, targetPort: 8080, name: http }
    {{- if .Values.certManager.enabled }}
    # 443 -> the TLS listener, so the rendered AGENT_INTELLIGENCE URL needs no
    # explicit port (https default).
    - { port: 443, targetPort: 8443, name: https }
    {{- end }}
{{- end }}
