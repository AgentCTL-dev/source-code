{{- $ns := include "agentctl.namespace" . }}
{{- if .Values.gateway.enabled }}
# RBAC for the A2A gateway: resolve Agent → pod (dials the agent pod's mTLS /mcp
# directly, same routing as the apiserver). Stateless; reads pods only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentctl-gateway
  namespace: {{ $ns }}
  {{- with .Values.gateway.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentctl-gateway
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # The mesh discovery registry (GET /agents) lists the CRDs.
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["agents", "agentfleets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentctl-gateway
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentctl-gateway
subjects:
  - kind: ServiceAccount
    name: agentctl-gateway
    namespace: {{ $ns }}
---
# The A2A gateway (RFC 0013): a replicated, stateless HTTP service fronting each
# agent's mTLS A2A surface (served on the agent pod, contract 2.0; the gateway
# presents the Management client cert). Projects each agent's Agent Card and
# routes spec-form A2A JSON-RPC to the bare v2.1 methods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-gateway
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-gateway
  template:
    metadata:
      {{- $podAnnotations := merge (deepCopy (.Values.gateway.podAnnotations | default dict)) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: agentctl-gateway
        {{- $podLabels := merge (deepCopy (.Values.gateway.podLabels | default dict)) (.Values.commonLabels | default dict) }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: agentctl-gateway
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      {{- with (include "agentctl.scheduling" (dict "root" $ "comp" "gateway")) }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: {{ include "agentctl.image" (dict "root" $ "component" "gateway") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }
            {{- if .Values.trustedProxy.enabled }}
            - { containerPort: 8443, name: https-proxy }   # TRUSTED-PROXY mTLS (RFC 0013)
            {{- end }}
          env:
            {{- include "agentctl.podEnv" (dict "root" $ "comp" "gateway") | nindent 12 }}
            # Durable A2A task store (RFC 0013).
            {{- include "agentctl.databaseUrlEnv" . | nindent 12 }}
            {{- with (include "agentctl.pgCaEnv" $) }}
            # verify-full: pin the chart CA for the Postgres hop (postgres.bundled.tls.verifyFull).
            {{- . | nindent 12 }}
            {{- end }}
            # Ed25519 seed for Agent Card JWS signing (RFC 0014).
            - name: GATEWAY_SIGNING_SEED
              valueFrom:
                secretKeyRef:
                  name: agentctl-gateway-signing
                  key: GATEWAY_SIGNING_SEED
            # Mesh registry federation (RFC 0014): peer gateway base URLs (CSV).
            # Peers are queried with ?local=1 to prevent recursion.
            {{- with .Values.gateway.federationPeers }}
            - name: FEDERATION_PEERS
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.apiToken.enabled }}
            # In-cluster bearer-token gate (apiToken.enabled): require
            # `Authorization: Bearer <this>` on A2A ingress (default off -> open).
            # External A2A clients must send this token; cards stay JWS-signed.
            - name: AGENTCTL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentctl-api-token
                  key: AGENTCTL_API_TOKEN
            {{- end }}
            {{- if .Values.trustedProxy.enabled }}
            # TRUSTED-PROXY mode (RFC 0013): open a second mTLS listener on :8443
            # that only the fronting proxy (APISIX) may reach. The gateway verifies
            # the proxy's client cert against the agentctl CA bundle (ca.crt) and the
            # allow-list, then trusts the identity headers the proxy injects.
            - name: TRUSTED_PROXY_ENABLED
              value: "true"
            - name: AGENTCTL_GATEWAY_TLS_ADDR
              value: "0.0.0.0:8443"
            # Serving cert (tls.crt/tls.key) for the :8443 mTLS listener + the CA
            # to verify the proxy's client cert — both in the mounted secret.
            - name: AGENTCTL_GATEWAY_TLS_DIR
              value: /etc/agentctl-trusted-proxy
            - name: TRUSTED_PROXY_CA
              value: /etc/agentctl-trusted-proxy/ca.crt
            - name: TRUSTED_PROXY_ALLOWED_NAMES
              value: {{ .Values.trustedProxy.allowedNames | default (list "apisix") | join "," | quote }}
            # Prefix -> the gateway trusts/strips <prefix>-subject/-email/-groups.
            - name: TRUSTED_PROXY_HEADER_PREFIX
              value: {{ .Values.trustedProxy.headerPrefix | default "x-agentctl" | quote }}
            {{- $ih := .Values.trustedProxy.identityHeaders | default dict }}
            {{- if or $ih.user $ih.email $ih.groups }}
            # Optional explicit per-header override (key=NAME); empty keys keep the
            # prefix-derived name. The gateway parser applies these onto the prefix.
            - name: TRUSTED_PROXY_IDENTITY_HEADERS
              value: {{ printf "user=%s,email=%s,groups=%s" ($ih.user | default "") ($ih.email | default "") ($ih.groups | default "") | quote }}
            {{- end }}
            {{- end }}
          {{- with (index .Values "gateway").envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Client cert the gateway presents to an agent pod's mTLS /mcp
            # (mints the Management origin the A2A methods require).
            - name: client-tls
              mountPath: /etc/agentctl-client/tls
              readOnly: true
            {{- if .Values.trustedProxy.enabled }}
            # Gateway serving cert (tls.crt/tls.key) for the :8443 listener + the
            # agentctl CA bundle (ca.crt) used to verify the fronting proxy's client cert.
            - name: trusted-proxy-tls
              mountPath: /etc/agentctl-trusted-proxy
              readOnly: true
            {{- end }}
            {{- with (include "agentctl.pgCaVolumeMount" $) }}
            {{- . | nindent 12 }}
            {{- end }}
          # Gate liveness/readiness until the process is up and the DB schema
          # migration has run, so a slow first start (waiting on Postgres) does
          # not trip the liveness probe and crash-loop the pod. ~60s budget.
          startupProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: client-tls
          secret:
            secretName: agentctl-client-tls
        {{- if .Values.trustedProxy.enabled }}
        - name: trusted-proxy-tls
          secret:
            secretName: agentctl-trusted-proxy-tls
        {{- end }}
        {{- with (include "agentctl.pgCaVolume" $) }}
        {{- . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-gateway
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  selector:
    app.kubernetes.io/name: agentctl-gateway
  ports:
    - { port: 80, targetPort: 8080, name: http }
    {{- if .Values.trustedProxy.enabled }}
    - { port: 8443, targetPort: 8443, name: https-proxy }   # TRUSTED-PROXY mTLS (RFC 0013)
    {{- end }}
---
# Ed25519 signing key for A2A Agent Card JWS signing (RFC 0014). The gateway
# loads the 32-byte seed (base64) and serves the public key at
# /.well-known/jwks.json. Chart-generated and kept across upgrades so cards
# verify consistently across replicas. Replace with a managed (rotated) secret
# for production.
apiVersion: v1
kind: Secret
metadata:
  name: agentctl-gateway-signing
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-gateway
    {{- include "agentctl.labels" . | nindent 4 }}
    {{- with (include "agentctl.commonLabels" $) }}
    {{- . | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/resource-policy": keep
{{/* Reuse the existing seed on upgrade so the JWS signing key is stable across
     replicas + upgrades (cards keep verifying). lookup is empty on fresh install. */}}
{{- $gwSecret := (lookup "v1" "Secret" $ns "agentctl-gateway-signing") }}
{{- $gwSeed := "" }}
{{- if and $gwSecret $gwSecret.data (hasKey $gwSecret.data "GATEWAY_SIGNING_SEED") }}
{{-   $gwSeed = index $gwSecret.data "GATEWAY_SIGNING_SEED" }}
{{- else }}
{{-   $gwSeed = randAlphaNum 32 | b64enc | b64enc }}
{{- end }}
type: Opaque
data:
  GATEWAY_SIGNING_SEED: {{ $gwSeed }}
{{- end }}
