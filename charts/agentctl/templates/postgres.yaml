{{- if eq .Values.postgres.mode "bundled" }}
{{- $ns := include "agentctl.namespace" . }}
{{/* Reuse the existing password on upgrade (idempotent) — regenerating it would
     break auth against the already-initialized Postgres data dir. lookup is empty
     during `helm template`/install (no cluster), so a fresh install generates one. */}}
{{- $existing := (lookup "v1" "Secret" $ns "agentctl-postgres") }}
{{- $pw := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "POSTGRES_PASSWORD") }}
{{-   $pw = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
{{-   $pw = randAlphaNum 24 }}
{{- end }}
# Postgres backing the gateway's durable A2A task store (RFC 0013 / brainstorm
# D4). Dev-grade: a single pod whose data dir is either ephemeral (emptyDir, the
# eval default) or a PersistentVolumeClaim (postgres.bundled.storage=pvc).
# Production would use a managed/replicated Postgres (or an operator) with a PVC
# + TLS + NetworkPolicy.
apiVersion: v1
kind: Secret
metadata:
  name: agentctl-postgres
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-postgres
    {{- include "agentctl.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $pw | quote }}
  # Consumed by the gateway. sslmode=disable: in-cluster NoTls (later hardening).
  DATABASE_URL: "postgres://agentctl:{{ $pw }}@agentctl-postgres.{{ $ns }}:5432/agentctl?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentctl-postgres
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-postgres
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentctl-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentctl-postgres
    spec:
      {{- include "agentctl.pullSecrets" . | nindent 6 }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.bundled.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: agentctl
            - name: POSTGRES_DB
              value: agentctl
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentctl-postgres
                  key: POSTGRES_PASSWORD
            # Postgres needs a writable data dir; PGDATA under the data mount.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { containerPort: 5432, name: postgres }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "agentctl", "-d", "agentctl"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
      volumes:
        - name: data
        {{- if eq .Values.postgres.bundled.storage "pvc" }}
          persistentVolumeClaim:
            claimName: agentctl-postgres
        {{- else }}
          emptyDir: {}
        {{- end }}
{{- if eq .Values.postgres.bundled.storage "pvc" }}
---
# Durable data dir for the bundled Postgres. helm.sh/resource-policy: keep so a
# `helm uninstall` does not delete the task store; remove the PVC by hand to
# reclaim. storageClassName empty -> the cluster's default StorageClass.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentctl-postgres
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-postgres
    {{- include "agentctl.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.bundled.pvcSize | quote }}
  {{- with .Values.postgres.bundled.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: agentctl-postgres
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agentctl-postgres
    {{- include "agentctl.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: agentctl-postgres
  ports:
    - { port: 5432, targetPort: 5432, name: postgres }
{{- end }}
