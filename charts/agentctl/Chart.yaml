apiVersion: v2
name: agentctl
description: >-
  The Kubernetes control plane for fleets of conformant agents — operator,
  on-node bridge (node-agent), aggregated APIServer, A2A gateway, intelligence
  ModelGateway, and admission webhook. Installs the Agent Control Contract CRDs
  and wires all TLS via cert-manager.
type: application
version: 0.1.0            # chart version
appVersion: "0.1.0"      # agentctl control-plane version
keywords: [agents, ai, operator, control-plane, a2a, mcp]
home: https://github.com/AgentCTL-dev/source-code
sources:
  - https://github.com/AgentCTL-dev/source-code
maintainers:
  - name: Andrii Tsok
    email: andrii@tsok.org
annotations:
  # cert-manager is a hard prerequisite (TLS for the apiserver, admission webhook,
  # and node-agent mTLS). The chart does not vendor it — install it first.
  agentctl.dev/requires: "cert-manager >= 1.13, a CNI for NetworkPolicy (optional)"
