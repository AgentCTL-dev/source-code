name: CLA Assistant

# Requires the contract + control plane to be relicensable for the dual
# (open-source / commercial) model — see CLA.md. Contributors sign by replying
# to the bot's comment on their PR; signatures are recorded on the
# `cla-signatures` branch.
#
# Setup: create a repo (or org) secret `CLA_SIGNATURES_TOKEN` — a PAT with
# `repo` scope used to write the signatures file. (GITHUB_TOKEN cannot push to a
# protected/secondary store reliably, hence the PAT.)

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck'
            || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-document: 'https://github.com/AgentCTL-dev/source-code/blob/main/CLA.md'
          path-to-signatures: 'signatures/v1/cla.json'
          branch: 'cla-signatures'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA — thank you!'
          # Bots and the maintainer don't need to sign.
          allowlist: 'dependabot[bot],*[bot]'
