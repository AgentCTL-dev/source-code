# Release pipeline for the agentctl control plane.
#
# Triggered by pushing a vX.Y.Z tag. Strips the leading "v" to derive the
# version, then:
#   images — build + push the 8 component images (multi-arch, with provenance
#            and SBOM) to ghcr.io/agentctl-dev/<comp>, tagged {{version}} + latest.
#   chart  — package the Helm chart and push it to
#            oci://ghcr.io/agentctl-dev/charts (chart name "agentctl").
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  # Required for cosign keyless (OIDC) signing via Sigstore Fulcio/Rekor.
  id-token: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # component -> Dockerfile dir + image name; crate/bin documented for
        # the mapping (the per-component Dockerfile builds the right binary).
        include:
          - component: operator
            crate: agentctl-operator
            bin: agentctl-operator
          - component: mcpgateway
            crate: agentctl-mcpgateway
            bin: agentctl-mcpgateway
          - component: apiserver
            crate: agentctl-apiserver
            bin: agentctl-apiserver
          - component: gateway
            crate: agentctl-gateway
            bin: agentctl-gateway
          - component: modelgateway
            crate: agentctl-modelgateway
            bin: agentctl-modelgateway
          - component: admission
            crate: agentctl-admission
            bin: agentctl-admission
          - component: coordination
            crate: agentctl-coordination
            bin: agentctl-coordination
          - component: scaler
            crate: agentctl-scaler
            bin: agentctl-scaler
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Cosign for keyless signing of the pushed images.
      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/agentctl-dev/${{ matrix.component }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          # Cross-run BuildKit layer cache (per component) — the cross-compile
          # build stage is cached so unchanged deps are not recompiled.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      # Keyless (OIDC) signature over the image by its immutable digest.
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "ghcr.io/agentctl-dev/${{ matrix.component }}@${{ steps.build.outputs.digest }}"

  chart:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3

      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # cosign reads the docker config for registry auth; `helm registry login`
      # alone leaves cosign unauthenticated (it 401s pulling the chart manifest to
      # sign it), so log docker in to GHCR too.
      - name: Log in to GHCR (Docker — for cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: helm package charts/agentctl --version "$VERSION" --app-version "$VERSION"

      - name: Push chart
        id: push
        run: |
          # helm push prints the pushed reference and its digest to stderr;
          # capture the digest so we can sign the chart by its immutable digest.
          out="$(helm push "agentctl-$VERSION.tgz" oci://ghcr.io/agentctl-dev/charts 2>&1)"
          echo "$out"
          digest="$(echo "$out" | awk -F': ' '/^Digest:/ {print $2}')"
          if [ -z "$digest" ]; then
            echo "::error::could not determine pushed chart digest"; exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # Keyless (OIDC) signature over the pushed chart by its digest.
      - name: Sign chart
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "ghcr.io/agentctl-dev/charts/agentctl@${{ steps.push.outputs.digest }}"
