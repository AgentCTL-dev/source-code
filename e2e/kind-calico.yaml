# kind cluster for the NetworkPolicy lane: kindnet OFF, Calico ON.
#
# The bundled kindnet CNI silently IGNORES NetworkPolicy, so the sec-netpol
# overlay's enforce assertions are skipped-with-reason on the default kind.yaml
# cluster. This variant disables the default CNI and declares a podSubnet that
# the Calico install (in up.sh, gated by E2E_CNI=calico) configures its IP pool
# from. Bring this lane up with:
#   E2E_CNI=calico make -C e2e up      # up.sh selects this file + installs Calico
# then run the NetworkPolicy scenarios (make -C e2e install OVERLAYS=values/sec-netpol.yaml e2e).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: agentctl-e2e
networking:
  # Hand the pod network to Calico instead of kindnet.
  disableDefaultCNI: true
  # Calico's default IPv4 pool — keep these in sync if you customise the Calico
  # install in up.sh. kube-proxy stays on (iptables) for Service VIPs.
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        imageGCHighThresholdPercent: 95
        imageGCLowThresholdPercent: 90
