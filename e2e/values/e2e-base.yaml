# Base values for the e2e suite. Layered UNDER every security overlay; turns on
# the planes the functional + benchmark scenarios drive, while leaving every
# security gate at its secure default (each overlay flips exactly one).
#
# image.registry is intentionally NOT set here — install.sh passes it (default ""
# = local kind-loaded names: agentctl/<comp>:dev). The 8 control-plane images are
# loaded by images.sh.

# Claim-mode coordination server (work.* over HTTP/MCP). Needed by the
# coordination-throughput bench, the claim scenarios, and KEDA scale-from-zero.
coordination:
  enabled: true
  store: memory                 # overlay store-postgres.yaml flips this

# Secretless/budgeted intelligence plane (contract 1.0: agent dials the ModelGateway
# keyless over TLS -> mock-provider). Enabled by default in the chart; pinned here.
#
# attestIdentity is ON so the ModelGateway derives the agent's identity from the
# caller's SOURCE IP (a kube pod lookup on status.podIP), never a spoofable header —
# the contract-1.0 identity model. The intelligence scenarios (intel-infer, plus
# prov-once / conf-exit-codes — agentd once-mode REQUIRES an intelligence endpoint)
# all ride this path; sec-mg-attest exercises the anti-spoof rejection on top of it.
modelgateway:
  enabled: true
  attestIdentity: true

# Tool-plane broker (contract 1.0): agents dial MCP tools keyless; the
# MCPGateway attests source-IP -> scopes to the bound MCPServerSet -> injects the
# credential -> forwards. Needed by the MCPServerSet tool scenario.
mcpgateway:
  enabled: true

# KEDA external scaler — claim-depth autoscaling (0->N->0). Enabling it also
# flips the operator's SCALER_ENABLED so it renders a ScaledObject per claim
# fleet. Requires KEDA in the cluster (up.sh installs it).
scaler:
  enabled: true

# Emit ServiceMonitors so the opt-in PromQL bench lane (up.sh E2E_PROMETHEUS=1,
# which installs kube-prometheus-stack + the monitoring.coreos.com CRDs) scrapes
# every target. NOTE: applying these requires those CRDs present — run the
# install lane with E2E_PROMETHEUS=1 (or pre-install the ServiceMonitor CRD).
metrics:
  serviceMonitor:
    enabled: true
