# Security gate: scaler<->coordination mTLS.
# Flips charts/agentctl/values.yaml `coordination.mtls.enabled`. The chart issues
# a serving cert for a second coordination listener on :8443 and a client cert
# the scaler presents (both off the agentctl CA); the coordination server
# verifies the scaler's client cert (CA + allowedNames) and the scaler verifies
# the serving cert + reads the backlog over https. Requires certManager.enabled
# (the chart default). Scenario: scaler reads backlog over the mTLS listener.
coordination:
  mtls:
    enabled: true
