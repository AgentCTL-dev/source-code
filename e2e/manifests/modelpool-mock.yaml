# e2e ModelPool wired to the e2e mock provider, plus the provider-credential
# Secret it references. The pool's optional credentialSecretRef names that Secret;
# the operator mounts it on the agent as INTELLIGENCE_TOKEN and the agent presents
# it when it dials the provider DIRECTLY (or the agent dials keyless via AAuth and
# holds no key at all). Used by the once-mode-complete scenario (prov-once): the
# intelligence agentd run dials the pool's endpoint and reaches a clean exit 0.
# Pairs with e2e/manifests/mock-provider.yaml (the OpenAI-shaped mock).
apiVersion: v1
kind: Secret
metadata:
  name: provider-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: modelpool-mock
type: Opaque
stringData:
  api-key: sk-mock-provider-secret-do-not-ship
---
apiVersion: agentctl.dev/v1alpha1
kind: ModelPool
metadata:
  name: mockpool
  namespace: default
spec:
  provider: mock
  endpoint: http://mock-provider.default:8080
  credentialSecretRef:
    name: provider-credentials
    key: api-key
  models: ["mock-model-v1"]
  defaultModel: mock-model-v1
