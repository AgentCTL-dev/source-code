# e2e: a once-mode agentd Agent that reaches intelligence (intelligence scenario).
#
# Why these choices (contract 1.0):
#   - mode: once + an instruction — agentd only reaches intelligence when it does
#     work; an idle reactive agent never infers. once-mode drives exactly one
#     inference against the bound provider.
#   - Agents dial intelligence DIRECTLY (no in-cluster broker). The operator
#     resolves the bound model.pool (a ModelPool) and renders a direct
#     INTELLIGENCE=<the pool's provider endpoint> that the agent dials itself —
#     secret-free via AAuth, or with an optional INTELLIGENCE_TOKEN mounted on the pod.
#   - model.pool: mockpool — binds the ModelPool from modelpool-mock.yaml (apply that
#     + mock-provider.yaml first); the agent dials that pool's endpoint (the OpenAI-
#     shaped mock) and the once-mode run reaches a clean exit 0.
#   - image: agentd:1.0.0 — the real contract-1.0 reference agent (images.sh builds/loads it).
apiVersion: agentctl.dev/v1alpha1
kind: Agent
metadata:
  name: intel-once
  namespace: default
spec:
  mode: once
  image: agentd:1.0.0
  instruction: "Summarize the input in one sentence."
  model:
    pool: mockpool
