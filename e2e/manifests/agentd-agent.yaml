# e2e: a once-mode agentd Agent on the ROUTED-INFER path (intelligence scenario).
#
# Why these choices (per the plan's Finding A):
#   - mode: once + an instruction — agentd only reaches intelligence when it does
#     work; an idle reactive agent never infers. once-mode drives exactly the
#     inference the ModelGateway meters/budgets.
#   - annotation agentctl.dev/routed-infer: "true" — the operator wires
#     AGENT_INTELLIGENCE=unix:/run/agentctl/infer/infer.sock and mounts the
#     node-agent infer socket dir read-only (needs nodeAgent.inferProxy.enabled,
#     set in values/e2e-base.yaml). No model key ever lands on the agent.
#   - modelPool: mockpool — binds the ModelPool from deploy/examples/modelpool-mock.yaml
#     (apply that + deploy/examples/mock-provider.yaml first). The pool caps the
#     budget at 150 tokens (mock returns 100/call) so the 3rd call 429s.
#   - image: agentd:1.0.0 — the real reference agent (images.sh builds/loads it).
apiVersion: agents.x-k8s.io/v1alpha1
kind: Agent
metadata:
  name: intel-once
  namespace: default
  annotations:
    agentctl.dev/routed-infer: "true"
spec:
  mode: once
  image: agentd:1.0.0
  instruction: "Summarize the input in one sentence."
  modelPool: mockpool
