# e2e: the REAL agentd<->coordination claim loop (contract 2.0).
#
# Contract 2.0 retired the v1 stdio->HTTP bridge: agentd speaks HTTPS MCP natively,
# so a claim-mode agent dials the coordination server's /mcp DIRECTLY (no bridge
# sidecar, no hostPath socket, no unix intelligence). The coordination server serves
# work.* on its /mcp endpoint and attests the caller by source IP
# (coordination.attestIdentity), so the claim is bound to the real pod:
#
#   agentd  --mode reactive
#           --mcp coord=http://agentctl-coordination.agentctl-system/mcp
#           --claim queue://jobs=coord                 (lease before processing)
#
# This is a RAW Deployment (not operator-rendered) — a deliberately minimal claim
# worker that only DIALS (it serves no management surface), so it needs no serving
# cert. It runs restricted-PSS (contract 2.0: no hostPath, no privilege). Scenario:
# submit work over /mcp, assert agentd claims + acks it (atomic single-grant,
# dedupe, re-offer). NOTE: the exact coordination dial (plaintext vs MCPGateway-
# brokered) is confirmed during the kind run; requires coordination.enabled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-worker
  namespace: default
  labels:
    app.kubernetes.io/name: claim-worker
spec:
  replicas: 2                      # contention: two workers race work.claim
  selector:
    matchLabels:
      app.kubernetes.io/name: claim-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claim-worker
    spec:
      terminationGracePeriodSeconds: 30   # > agentd --drain-timeout (25s default)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentd
          image: agentd:2.x
          imagePullPolicy: IfNotPresent
          args:
            - "--mode"
            - "reactive"
            - "--mcp"
            - "coord=http://agentctl-coordination.agentctl-system/mcp"
            - "--claim"
            - "queue://jobs=coord"
            - "--metrics-addr"
            - "0.0.0.0:9090"
          ports:
            - { containerPort: 9090, name: metrics }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
