# e2e low-budget ModelPool for the budget-REJECTION scenario (intel-budget-429).
#
# Separate from mockpool (the headroom pool) so the metering/complete scenarios
# never trip the budget while THIS pool deliberately does: maxTokens 150 with the
# mock returning 100 tok/call, so once the pool's cumulative (durable, Postgres)
# usage passes 150 the ModelGateway rejects an inference with a budget 429
# (`agentctl_modelgateway_budget_rejections_total`). The probe targets it by name
# via the `X-Model-Pool: mockpool-budget` header. Reuses the same provider-
# credential Secret name as modelpool-mock.yaml (apply that or this — the Secret
# is identical) and the same mock-provider Service.
apiVersion: v1
kind: Secret
metadata:
  name: provider-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: modelpool-mock
type: Opaque
stringData:
  api-key: sk-mock-provider-secret-do-not-ship
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: ModelPool
metadata:
  name: mockpool-budget
  namespace: default
spec:
  provider: mock
  endpoint: http://mock-provider.default:8080
  credentialSecretRef:
    name: provider-credentials
    key: api-key
  models: ["mock-model-v1"]
  defaultModel: mock-model-v1
  budget:
    maxTokens: 150
